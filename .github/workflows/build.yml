name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-2025
            artifact: khdays-port-windows-x64
          - name: Linux x64
            os: ubuntu-24.04
            artifact: khdays-port-linux-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SDL3 build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            ninja-build \
            libasound2-dev \
            libpulse-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libdecor-0-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libudev-dev

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 18 2026" `
            -A x64 `
            -DBUILD_TESTING=ON

      - name: Configure Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run CTest
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Run Python tool tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Upload Windows executable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/Release/khdays-port.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux executable
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/khdays-port
          if-no-files-found: error
          retention-days: 7

  sanitizers:
    name: Sanitizers (Linux x64)
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # The parser tests link only khdays-assets, so SDL3 is never built here.
      # Only the toolchain and generator are required to compile them.
      - name: Install build tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build pkg-config

      - name: Configure with sanitizers
        shell: bash
        run: |
          cmake -S . -B build-san \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DKHDAYS_ENABLE_SANITIZERS=ON \
            -DSDL_UNIX_CONSOLE_BUILD=ON

      - name: Build sanitized asset tests
        run: >-
          cmake --build build-san --target
          khdays-tex0-test khdays-mdl0-test khdays-mesh-test
          khdays-message-test khdays-audio-test khdays-graphics2d-test
          khdays-font-test

      # Exclude the SDL-linked version smoke test; only the asset parsers and
      # the mesh decoder are built and exercised here.
      - name: Run asset tests under ASan and UBSan
        env:
          ASAN_OPTIONS: abort_on_error=1:halt_on_error=1:detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build-san -E port-version --output-on-failure
